## render.yaml — Render Blueprint
## Docs: https://render.com/docs/blueprint-spec
##
## Deploy everything at once:
##   1. Push this file to GitHub
##   2. Go to https://dashboard.render.com/blueprints → "New Blueprint Instance"
##   3. Connect your repo and click Deploy

services:
  # ── Backend API + WebSocket Server ─────────────────────────────────────────
  - type: web
    name: cococode-server
    runtime: docker
    dockerfilePath: ./apps/server/Dockerfile
    dockerContext: ./apps/server
    plan: starter          # upgrade to standard for more RAM / CPU
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      # Render injects DATABASE_URL automatically when you link the DB below
      - key: DATABASE_URL
        fromDatabase:
          name: cococode-db
          property: connectionString
      # Render injects REDIS_URL automatically when you link Redis below
      - key: REDIS_URL
        fromService:
          name: cococode-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true     # Render generates a random secret on first deploy
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: BCRYPT_ROUNDS
        value: 12
      # Set this to your frontend URL after the static site is created.
      # You can add multiple comma-separated origins:
      #   https://cococode.onrender.com,https://yourdomain.com
      - key: CORS_ORIGIN
        sync: false             # fill this in manually in the Render dashboard
      - key: GEMINI_API_KEY
        sync: false             # fill in manually
      - key: GEMINI_AUTOCOMPLETE_KEY
        sync: false             # fill in manually (can be same as above)
      # Optional OAuth
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false

  # ── Frontend Static Site ────────────────────────────────────────────────────
  - type: web
    name: cococode-web
    runtime: static
    buildCommand: cd apps/web && npm install && npm run build
    staticPublishPath: apps/web/dist
    pullRequestPreviewsEnabled: false
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      # Proxy /api/* and /socket.io/* to the backend
      - type: rewrite
        source: /api/*
        destination: https://cococode-server.onrender.com/api/:splat
      - type: rewrite
        source: /socket.io/*
        destination: https://cococode-server.onrender.com/socket.io/:splat
      # SPA fallback — all other routes serve index.html
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # VITE_API_URL and VITE_WS_URL are baked into the bundle at build time.
      # After first deploy, copy your cococode-server URL from the Render dashboard
      # and set these here (or in the Render dashboard env vars UI).
      # Example:
      #   VITE_API_URL = https://cococode-server.onrender.com/api
      #   VITE_WS_URL  = https://cococode-server.onrender.com
      - key: VITE_API_URL
        sync: false
      - key: VITE_WS_URL
        sync: false

  # ── Redis ───────────────────────────────────────────────────────────────────
  - type: redis
    name: cococode-redis
    plan: starter
    ipAllowList: []             # only allow internal render network access

databases:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  - name: cococode-db
    databaseName: cococode
    user: cococode
    plan: starter
